[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy all /api/* calls to the Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://shopez-trade-backend.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — all React Router routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
