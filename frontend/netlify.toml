[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

# Proxy all /api/* calls to your deployed backend
# Replace the URL below with your actual backend URL after deploying to Render/Railway
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR-BACKEND-URL.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
